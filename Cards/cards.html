<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trackly - Galeria de Cards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8f9; color: #333; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            height: 70px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }

        .header-logo img {
            height: 35px;
            width: auto;
        }

        .btn-upload {
            background-color: #ea4c89;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        /* GRID DE CARDS (Obrigatório Display Grid) */
        main {
            padding: 40px 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            cursor: pointer;
        }

        .card-image {
            width: 100%;
            height: 220px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-footer {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            background-color: #28a745;
            border-radius: 50%;
        }

        .stats {
            font-size: 12px;
            color: #9e9ea7;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <img src="logo.png" alt="Logo">
        </div>
        <button class="btn-upload">Upload Project</button>
    </header>

    <main>
        <div class="grid-container">
            
            <div class="card">
                <div class="card-image">
                    <img src="cao.jpg" alt="Projeto Cão">
                </div>
                <div class="card-footer">
                    <div class="author-info">
                        <div class="author-avatar"></div>
                        <span>Pet Tech</span>
                    </div>
                    <div class="stats">❤️ 45</div>
                </div>
            </div>

            <div class="card">
                <div class="card-image">
                    <img src="nitro.jpg" alt="Projeto Nitro">
                </div>
                <div class="card-footer">
                    <div class="author-info">
                        <div class="author-avatar"></div>
                        <span>Speed Design</span>
                    </div>
                    <div class="stats">❤️ 89</div>
                </div>
            </div>

            <div class="card">
                <div class="card-image">
                    <img src="passaro.jpg" alt="Projeto Pássaro">
                </div>
                <div class="card-footer">
                    <div class="author-info">
                        <div class="author-avatar"></div>
                        <span>Nature UI</span>
                    </div>
                    <div class="stats">❤️ 120</div>
                </div>
            </div>

            <div class="card">
                <div class="card-image">
                    <img src="praia.jpg" alt="Projeto Praia">
                </div>
                <div class="card-footer">
                    <div class="author-info">
                        <div class="author-avatar"></div>
                        <span>Summer App</span>
                    </div>
                    <div class="stats">❤️ 210</div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
