<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trackly - Netflix Layout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #141414; 
            color: white;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            width: 100%;
            z-index: 10;
        }

        .header-logo img {
            height: 35px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: 50px;
            flex-grow: 1;
            font-size: 14px;
        }

        main {
            padding: 120px 0 50px 50px;
        }

        .row {
            margin-bottom: 40px;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e5e5e5;
        }

        .cards-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 20px 0;
            scrollbar-width: none;
        }

        .cards-container::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 250px;
            height: 140px;
            background-color: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover {
            transform: scale(1.1);
            z-index: 5;
        }

        /* BOTÕES VERMELHOS E MENORES */
        .features-section {
            margin-top: 40px;
            padding-right: 50px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .feature-item {
            background-color: #e50914; 
            padding: 15px 20px;
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
            max-width: 300px; 
        }

        .feature-item h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .feature-item p {
            color: #fff;
            font-size: 0.85rem;
            line-height: 1.3;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <img src="logo.png" alt="Trackly Logo">
        </div>
        <div class="nav-links">
            <span>Início</span>
            <span>Séries</span>
            <span>Filmes</span>
            <span>Minha Lista</span>
        </div>
    </header>

    <main>
        <div class="row">
            <h2 class="row-title">Populares no Paraná</h2>
            <div class="cards-container">
                <div class="card"><img src="Serie1.png" alt="Série 1"></div>
                <div class="card"><img src="Serie2.png" alt="Série 2"></div>
                <div class="card"><img src="Serie3.png" alt="Série 3"></div>
                <div class="card"><img src="Serie4.png" alt="Série 4"></div>
                <div class="card"><img src="Serie5.png" alt="Série 5"></div>
            </div>
        </div>

        <div class="features-section">
            <div class="feature-item">
                <h3>Assista onde quiser</h3>
                <p>Acompanhe as rotas de coleta no seu celular ou TV.</p>
            </div>
            <div class="feature-item">
                <h3>Perfis Família</h3>
                <p>Educação ambiental para cada morador.</p>
            </div>
            <div class="feature-item">
                <h3>Baixe e veja</h3>
                <p>Consulte o cronograma mesmo offline.</p>
            </div>
        </div>
    </main>

</body>
</html>
